  <script>
    (function() {
      const plot = document.getElementById("strava_plot");
      const mapPlot = document.getElementById("route_map_plot");
      const controls = document.getElementById("seg-controls");
      if (!plot || !controls) return;
      const mapHighlightTrace = 1;
      const intervalTraceIndices = [3, 4, 5, 6, 7, 8, 9];

      function parsePoints(value) {
        try {
          const points = JSON.parse(value || "[]");
          return Array.isArray(points) ? points : [];
        } catch (_err) {
          return [];
        }
      }

      function updateMapHighlight(sourceRadio) {
        if (!mapPlot || !window.Plotly) return;
        let radio = sourceRadio && sourceRadio.checked ? sourceRadio : null;
        if (!radio) {
          const checked = Array.from(controls.querySelectorAll(".seg-toggle:checked"));
          radio = checked.length ? checked[checked.length - 1] : null;
        }
        if (!radio) {
          Plotly.restyle(mapPlot, { lat: [[]], lon: [[]] }, [mapHighlightTrace]);
          return;
        }
        const lats = parsePoints(radio.dataset.mapLats);
        const lons = parsePoints(radio.dataset.mapLons);
        Plotly.restyle(mapPlot, { lat: [lats], lon: [lons] }, [mapHighlightTrace]);
      }

      controls.querySelectorAll(".seg-toggle").forEach((radio) => {
        radio.addEventListener("change", () => {
          if (!radio.checked) return;
          const idx = Number(radio.dataset.traceIndex);
          Plotly.restyle(plot, { visible: false }, intervalTraceIndices);
          Plotly.restyle(plot, { visible: true }, [idx]);
          updateMapHighlight(radio);
        });
      });
    })();
  </script>
