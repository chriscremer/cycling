    </div>
  </div>
  <script>
    (function() {
      const plot = document.getElementById("strava_plot");
      const mapPlot = document.getElementById("route_map_plot");
      const controls = document.getElementById("seg-controls");
      if (!plot || !controls) return;
      const mapHighlightTrace = 1;

      function parsePoints(value) {
        try {
          const points = JSON.parse(value || "[]");
          return Array.isArray(points) ? points : [];
        } catch (_err) {
          return [];
        }
      }

      function updateMapHighlight(sourceCheckbox) {
        if (!mapPlot || !window.Plotly) return;
        let checkbox = sourceCheckbox && sourceCheckbox.checked ? sourceCheckbox : null;
        if (!checkbox) {
          const checked = Array.from(controls.querySelectorAll(".seg-toggle:checked"));
          checkbox = checked.length ? checked[checked.length - 1] : null;
        }
        if (!checkbox) {
          Plotly.restyle(mapPlot, { lat: [[]], lon: [[]] }, [mapHighlightTrace]);
          return;
        }
        const lats = parsePoints(checkbox.dataset.mapLats);
        const lons = parsePoints(checkbox.dataset.mapLons);
        Plotly.restyle(mapPlot, { lat: [lats], lon: [lons] }, [mapHighlightTrace]);
      }

      controls.querySelectorAll(".seg-toggle").forEach((checkbox) => {
        checkbox.addEventListener("change", () => {
          const idx = Number(checkbox.dataset.traceIndex);
          const visible = checkbox.checked;
          Plotly.restyle(plot, { visible: visible }, [idx]);
          updateMapHighlight(checkbox);
        });
      });
    })();
  </script>
